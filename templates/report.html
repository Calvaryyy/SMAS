<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SMAS — Security Report</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f8f9fc;
      --surface2: #eef0f5;
      --border: #dde1ea;
      --accent: #0e1a2f;
      --accent2: #1e40af;
      --text: #0e1a2f;
      --muted: #6b7280;
      --danger: #dc2626;
      --success: #059669;
      --warn: #d97706;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      padding: 0;
    }

    /* ---- Print / PDF styles ---- */
    @media print {
      .no-print { display: none !important; }
      body { background: white; }
      .page-break { page-break-before: always; }
      .account-card { break-inside: avoid; }
    }

    /* ---- Top bar (screen only) ---- */
    .topbar {
      background: var(--accent);
      color: white;
      padding: 14px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      no-print: true;
    }

    .topbar .logo {
      font-family: var(--font-head);
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    .topbar .logo span { color: #00e5ff; }

    .btn-pdf {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      background: #00e5ff;
      color: #000;
      border: none;
      border-radius: 6px;
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-pdf:hover { opacity: 0.85; }

    /* ---- Report wrapper ---- */
    .report {
      max-width: 860px;
      margin: 0 auto;
      padding: 48px 40px 80px;
    }

    /* ---- Cover block ---- */
    .cover {
      border-bottom: 3px solid var(--accent);
      padding-bottom: 36px;
      margin-bottom: 40px;
    }

    .cover .tag {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .cover h1 {
      font-family: var(--font-head);
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .cover .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .meta-row {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
    }

    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .meta-item .ml { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
    .meta-item .mv { font-size: 14px; font-weight: 500; color: var(--text); }

    /* ---- Summary bar ---- */
    .summary-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 40px;
    }

    .summary-cell {
      background: var(--surface);
      padding: 20px 24px;
      text-align: center;
    }

    .summary-cell .sc-val {
      font-family: var(--font-head);
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }

    .summary-cell .sc-label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ---- Section heading ---- */
    .section-title {
      font-family: var(--font-head);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
      margin-bottom: 24px;
      margin-top: 40px;
    }

    /* ---- Account Cards ---- */
    .account-card {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 28px;
    }

    .ac-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      background: var(--accent);
      color: white;
    }

    .ac-header .ac-left h2 {
      font-family: var(--font-head);
      font-size: 18px;
      font-weight: 700;
    }

    .ac-header .ac-left .ac-sub {
      font-size: 12px;
      opacity: 0.65;
      margin-top: 3px;
    }

    .ac-header .ac-score-block {
      text-align: right;
    }

    .ac-header .ac-score-val {
      font-family: var(--font-head);
      font-size: 2.4rem;
      font-weight: 800;
      line-height: 1;
    }

    .ac-header .ac-score-label {
      font-size: 11px;
      opacity: 0.6;
      margin-top: 2px;
    }

    .ac-body {
      padding: 24px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    @media (max-width: 580px) {
      .ac-body { grid-template-columns: 1fr; }
    }

    .ac-risk-box {
      padding: 16px 20px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .risk-excellent-bg { background: #ecfdf5; border: 1px solid #a7f3d0; }
    .risk-fair-bg      { background: #fffbeb; border: 1px solid #fde68a; }
    .risk-poor-bg      { background: #fef2f2; border: 1px solid #fecaca; }

    .risk-icon {
      font-size: 28px;
      line-height: 1;
    }

    .risk-label-text {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .risk-level-name {
      font-family: var(--font-head);
      font-size: 20px;
      font-weight: 800;
    }

    .risk-excellent .risk-level-name { color: #059669; }
    .risk-fair      .risk-level-name { color: #d97706; }
    .risk-poor      .risk-level-name { color: #dc2626; }

    /* Gauge */
    .gauge-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .gauge-wrap svg { width: 120px; height: 70px; }

    /* Recommendations */
    .recs-section {
      padding: 0 24px 24px;
    }

    .recs-title {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .rec-item {
      display: flex;
      gap: 12px;
      padding: 10px 14px;
      background: var(--surface);
      border-left: 3px solid var(--accent2);
      border-radius: 0 6px 6px 0;
      margin-bottom: 8px;
      font-size: 13px;
      line-height: 1.55;
    }

    .rec-item::before {
      content: '→';
      color: var(--accent2);
      flex-shrink: 0;
    }

    .no-recs {
      font-size: 13px;
      color: var(--success);
      padding: 10px 14px;
      background: #ecfdf5;
      border-radius: 6px;
      border: 1px solid #a7f3d0;
    }

    /* ---- Footer ---- */
    .report-footer {
      margin-top: 56px;
      border-top: 1px solid var(--border);
      padding-top: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: var(--muted);
    }

    /* ---- Empty state ---- */
    .empty-report {
      text-align: center;
      padding: 80px 24px;
      color: var(--muted);
    }

    .empty-report h2 {
      font-family: var(--font-head);
      font-size: 20px;
      margin-bottom: 12px;
    }

    .progress-ring {
      transform: rotate(-90deg);
    }
  </style>
</head>
<body>

  <!-- TOP BAR (screen only) -->
  <div class="topbar no-print">
    <div class="logo">SMAS <span>REPORT</span></div>
    <button class="btn-pdf" onclick="downloadPDF()">⬇ &nbsp;Download PDF</button>
  </div>

  <div class="report" id="reportContent">
    <div class="empty-report" id="emptyState">
      <h2>No report data found.</h2>
      <p>Please return to the assessment and click <strong>Generate Full Report</strong>.</p>
    </div>
  </div>

<script>
// =============================================
//  Load sessions from sessionStorage
// =============================================
const sessions = JSON.parse(sessionStorage.getItem("smas_sessions") || "null");
const report = document.getElementById("reportContent");

if (!sessions || sessions.length === 0) {
  // empty state already shown
} else {
  document.getElementById("emptyState").remove();
  buildReport(sessions);
}

function buildReport(sessions) {
  const now = new Date();
  const dateStr = now.toLocaleDateString("en-GB", { day: "2-digit", month: "long", year: "numeric" });
  const timeStr = now.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" });

  const avgScore = Math.round(sessions.reduce((s, x) => s + x.score, 0) / sessions.length);
  const excellentCount = sessions.filter(s => s.risk === "Excellent").length;
  const poorCount = sessions.filter(s => s.risk === "Poor").length;

  report.innerHTML = `
    <!-- Cover -->
    <div class="cover">
      <div class="tag">Confidential Security Assessment Document</div>
      <h1>Security Audit Report</h1>
      <div class="subtitle">Social Media Account Security Monitoring System (SMAS)</div>
      <div class="meta-row">
        <div class="meta-item"><span class="ml">Generated</span><span class="mv">${dateStr} at ${timeStr}</span></div>
        <div class="meta-item"><span class="ml">Total Accounts</span><span class="mv">${sessions.length}</span></div>
        <div class="meta-item"><span class="ml">Average Score</span><span class="mv">${avgScore} / 100</span></div>
      </div>
    </div>

    <!-- Summary Bar -->
    <div class="summary-bar">
      <div class="summary-cell">
        <div class="sc-val">${sessions.length}</div>
        <div class="sc-label">Accounts Assessed</div>
      </div>
      <div class="summary-cell">
        <div class="sc-val" style="color:${avgScore >= 70 ? '#059669' : avgScore >= 50 ? '#d97706' : '#dc2626'}">${avgScore}</div>
        <div class="sc-label">Overall Avg. Score</div>
      </div>
      <div class="summary-cell">
        <div class="sc-val" style="color:${poorCount > 0 ? '#dc2626' : '#059669'}">${poorCount}</div>
        <div class="sc-label">Poor Risk Accounts</div>
      </div>
    </div>

    <div class="section-title">Detailed Assessment Results</div>

    ${sessions.map((s, i) => buildAccountCard(s, i)).join("")}

    <div class="report-footer">
      <span>SMAS &mdash; Social Media Account Security Monitoring System</span>
      <span>Generated ${dateStr}</span>
    </div>
  `;
}

function buildAccountCard(s, index) {
  const risk = s.risk.toLowerCase();
  const riskIcon = risk === "excellent" ? "✅" : risk === "fair" ? "⚠️" : "🚨";
  const bgClass = `risk-${risk}-bg`;
  const colorClass = `risk-${risk}`;

  // Build arc gauge SVG
  const pct = s.score / 100;
  const r = 54;
  const cx = 60;
  const cy = 64;
  const start = { x: cx - r, y: cy };
  const end = { x: cx + r, y: cy };
  const angle = Math.PI * pct;
  const endX = cx + r * Math.cos(Math.PI - angle);
  const endY = cy - r * Math.sin(angle);
  const largeArc = pct > 0.5 ? 1 : 0;
  const gaugeColor = risk === "excellent" ? "#059669" : risk === "fair" ? "#d97706" : "#dc2626";

  const gaugeSVG = `
    <svg viewBox="0 0 120 70" xmlns="http://www.w3.org/2000/svg">
      <path d="M ${cx - r} ${cy} A ${r} ${r} 0 0 1 ${cx + r} ${cy}" fill="none" stroke="#e5e7eb" stroke-width="10" stroke-linecap="round"/>
      ${pct > 0 ? `<path d="M ${cx - r} ${cy} A ${r} ${r} 0 ${largeArc} 1 ${endX} ${endY}" fill="none" stroke="${gaugeColor}" stroke-width="10" stroke-linecap="round"/>` : ""}
      <text x="${cx}" y="${cy - 4}" text-anchor="middle" font-family="'Syne',sans-serif" font-size="20" font-weight="800" fill="${gaugeColor}">${s.score}</text>
      <text x="${cx}" y="${cy + 10}" text-anchor="middle" font-family="'DM Mono',monospace" font-size="8" fill="#9ca3af">/100</text>
    </svg>
  `;

  const recsHTML = s.recommendations.length === 0
    ? `<div class="no-recs">✓ No recommendations — account appears well-secured.</div>`
    : s.recommendations.map(r => `<div class="rec-item">${r}</div>`).join("");

  return `
    <div class="account-card">
      <div class="ac-header">
        <div class="ac-left">
          <h2>${s.platform} — ${s.handle}</h2>
          <div class="ac-sub">${s.accountType}</div>
        </div>
        <div class="ac-score-block">
          <div class="ac-score-val">${s.score}<span style="font-size:1rem;opacity:0.5">/100</span></div>
          <div class="ac-score-label">Security Score</div>
        </div>
      </div>

      <div class="ac-body">
        <div class="ac-risk-box ${bgClass} ${colorClass}">
          <div class="risk-icon">${riskIcon}</div>
          <div>
            <div class="risk-label-text">Risk Level</div>
            <div class="risk-level-name">${s.risk}</div>
          </div>
        </div>
        <div class="gauge-wrap">
          ${gaugeSVG}
        </div>
      </div>

      <div class="recs-section">
        <div class="recs-title">Recommendations (${s.recommendations.length})</div>
        ${recsHTML}
      </div>
    </div>
  `;
}

// =============================================
//  PDF Download via print
// =============================================
function downloadPDF() {
  window.print();
}
</script>

</body>
</html>
